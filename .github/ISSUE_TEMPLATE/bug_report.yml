name: Bug Report
description: Report a bug in Muxy
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        **Humans only:** write this issue in your own words. AI-generated text is not allowed and will be closed without review.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened, and what did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Open Muxy
        2. ...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Muxy Version
      placeholder: e.g. 1.0
    validations:
      required: true

  - type: input
    id: macos
    attributes:
      label: macOS Version
      placeholder: e.g. 15/26
    validations:
      required: true
